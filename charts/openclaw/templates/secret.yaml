{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw.secretName" . }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ required "secrets.anthropicApiKey is required (or set secrets.existingSecret)" .Values.secrets.anthropicApiKey | quote }}
  OPENCLAW_GATEWAY_TOKEN: {{ .Values.secrets.gatewayToken | quote }}
{{- end }}
