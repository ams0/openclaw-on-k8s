{{- if .Values.expose.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "openclaw.fullname" . }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.expose.gatewayName }}
      # Gateway lives in the same namespace as this release.
      sectionName: https
  hostnames:
    - {{ required "expose.host is required when expose.enabled" .Values.expose.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "openclaw.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
