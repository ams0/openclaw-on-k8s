# Default values for the openclaw chart.
# This is a YAML-formatted file.

image:
  repository: ghcr.io/openclaw/openclaw
  # Pin a concrete tag in production (e.g. "2026.2.26"). "latest" is fine for the demo.
  tag: "latest"
  pullPolicy: IfNotPresent

# Number of replicas. OpenClaw keeps local state on a PVC, so keep this at 1
# unless you switch to a shared/ReadWriteMany volume.
replicaCount: 1

# OpenClaw application configuration.
openclaw:
  # Model is "<provider>/<model-id>". Point this at any provider OpenClaw supports.
  # Set a valid model id for your account before relying on agent responses.
  model: "anthropic/claude-sonnet-4-5"
  # The gateway listens on this port for the Control UI / API.
  port: 18789
  # Start args passed to `openclaw gateway run`. --allow-unconfigured lets the
  # gateway boot in a container without the interactive onboarding flow.
  allowUnconfigured: true
  extraArgs: []
  # Extra environment variables (name/value) injected into the container.
  extraEnv: []

# Secret values. For the demo these are supplied at install time via --set or
# an env-substituted values file; never commit real keys to git.
secrets:
  # Anthropic API key, exposed to the container as ANTHROPIC_API_KEY.
  anthropicApiKey: ""
  # Gateway token used by the Control UI to authenticate. Auto-generated by the
  # deploy script if left empty there; required for a usable UI.
  gatewayToken: ""
  # If you manage the secret out-of-band, set this to an existing Secret name and
  # the chart will not render its own Secret. The Secret must contain keys
  # ANTHROPIC_API_KEY and OPENCLAW_GATEWAY_TOKEN.
  existingSecret: ""

# Persistent state for /home/node/.openclaw (config, workspace, memory).
persistence:
  enabled: true
  size: 2Gi
  # Leave empty to use the cluster default StorageClass (AKS: managed-csi).
  storageClass: ""
  accessMode: ReadWriteOnce

service:
  type: ClusterIP
  port: 18789

# Gateway API exposure. Toggled on by scripts/50-expose.sh once the Gateway has
# a LoadBalancer IP and a hostname is known.
expose:
  enabled: false
  # Concrete hostname for the HTTPRoute, e.g. openclaw.4.231.10.5.nip.io
  host: ""
  # Name of the Gateway to attach to and its namespace (same ns as this release).
  gatewayName: openclaw-gateway
  # TLS via cert-manager. The Certificate is issued by the CA ClusterIssuer into
  # the secret the Gateway's HTTPS listener references.
  tls:
    enabled: true
    secretName: openclaw-tls
    clusterIssuer: openclaw-ca-issuer

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Runs as the non-root `node` user (uid 1000) baked into the image.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

serviceAccount:
  create: true
  name: ""

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
