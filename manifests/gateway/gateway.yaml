# Gateway lives in the same namespace as the OpenClaw release so the HTTPRoute
# and the cert-manager TLS secret are co-located (no ReferenceGrant needed).
# Envoy Gateway provisions a LoadBalancer Service for this Gateway; on AKS that
# yields a public IP.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: openclaw-gateway
  namespace: openclaw
spec:
  gatewayClassName: envoy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          # Populated by cert-manager via the openclaw chart's Certificate once a
          # hostname is known. Until then this listener stays not-programmed; the
          # http listener still serves traffic.
          - kind: Secret
            name: openclaw-tls
      allowedRoutes:
        namespaces:
          from: Same
