# Values for jetstack/cert-manager.
# CRDs are installed by the chart itself so the demo stays single-command.
crds:
  enabled: true
  keep: true

# Enable Gateway API support so cert-manager can solve ACME HTTP-01 challenges
# over the Gateway (used by the optional Let's Encrypt ClusterIssuer). Required
# for solvers.http01.gatewayHTTPRoute.
featureGates: "ExperimentalGatewayAPISupport=true"

# Modest footprint for a demo cluster.
resources:
  requests:
    cpu: 10m
    memory: 64Mi

webhook:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi

cainjector:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
